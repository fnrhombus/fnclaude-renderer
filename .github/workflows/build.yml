name: build

# Reusable workflow: called by release.yml on tag push.
# Produces a `dist` artifact containing per-platform archives + checksums.txt.
# Archive names match the source_* URLs in packaging/aur/PKGBUILD.

on:
  workflow_call:
    inputs:
      version:
        required: true
        type: string
        description: "Release version (the pushed tag, e.g. v1.2.3)"

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            os_name: Linux
            arch_name: x86_64
            archive_ext: tar.gz
          - target: bun-linux-arm64
            os_name: Linux
            arch_name: arm64
            archive_ext: tar.gz
          - target: bun-darwin-x64
            os_name: Darwin
            arch_name: x86_64
            archive_ext: tar.gz
          - target: bun-darwin-arm64
            os_name: Darwin
            arch_name: arm64
            archive_ext: tar.gz
          - target: bun-windows-x64
            os_name: Windows
            arch_name: x86_64
            archive_ext: zip
          - target: bun-windows-arm64
            os_name: Windows
            arch_name: arm64
            archive_ext: zip

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        env:
          TARGET: ${{ matrix.target }}
          OS_NAME: ${{ matrix.os_name }}
          ARCH_NAME: ${{ matrix.arch_name }}
        run: |
          set -euo pipefail
          OUTFILE="fnclaude-renderer"
          if [[ "$OS_NAME" == "Windows" ]]; then
            OUTFILE="fnclaude-renderer.exe"
          fi
          bun build --compile \
            --target="$TARGET" \
            --outfile="$OUTFILE" \
            ./src/index.tsx

      - name: Archive
        id: archive
        env:
          OS_NAME: ${{ matrix.os_name }}
          ARCH_NAME: ${{ matrix.arch_name }}
          EXT: ${{ matrix.archive_ext }}
        run: |
          set -euo pipefail
          ARCHIVE="fnclaude-renderer_${OS_NAME}_${ARCH_NAME}.${EXT}"
          if [[ "$EXT" == "zip" ]]; then
            zip "$ARCHIVE" fnclaude-renderer.exe
          else
            tar -czf "$ARCHIVE" fnclaude-renderer
          fi
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.os_name }}-${{ matrix.arch_name }}
          path: ${{ steps.archive.outputs.archive }}
          retention-days: 1

  assemble:
    name: assemble dist
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: archive-*
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum fnclaude-renderer_*.tar.gz fnclaude-renderer_*.zip > checksums.txt
          cat checksums.txt

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1
